name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.2.0)'
        required: true
        type: string
      message:
        description: 'Tag message — add [force] for mandatory upgrade'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Validate version format
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION (expected vX.Y.Z)"
            exit 1
          fi

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG="${{ inputs.message }}"
          if [ -z "$MSG" ]; then MSG="${{ inputs.version }}"; fi
          git tag -a "${{ inputs.version }}" -m "$MSG"
          git push origin "${{ inputs.version }}"

      - name: Setup pnpm
        run: pnpm install --frozen-lockfile

      - name: Compute deploy serial
        id: deploy-serial
        env:
          DEPLOY_MSG: ${{ inputs.message }}
        run: |
          CURRENT=${{ vars.FORCE_UPGRADE_SERIAL }}
          CURRENT=${CURRENT:-0}
          IS_FORCE=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if printf '%s' "$DEPLOY_MSG" | grep -qF '[force]'; then
              IS_FORCE=true
              NEXT=$((CURRENT + 1))
              echo "serial=${NEXT}" >> $GITHUB_OUTPUT
              echo "next-serial=${NEXT}" >> $GITHUB_OUTPUT
            else
              echo "serial=${CURRENT}" >> $GITHUB_OUTPUT
            fi
          else
            echo "serial=${CURRENT}" >> $GITHUB_OUTPUT
          fi

          echo "is-force=${IS_FORCE}" >> $GITHUB_OUTPUT
          SERIAL=$(tail -1 "$GITHUB_OUTPUT" | grep '^serial=' | cut -d= -f2)
          echo "Deploy serial: ${SERIAL}, force: ${IS_FORCE}"

      - name: Build
        run: pnpm run build
        env:
          DEPLOY_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
          FORCE_UPGRADE_SERIAL: ${{ steps.deploy-serial.outputs.serial }}
          SITE_URL: https://end.canmoe.com
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_ALLOWED_DOMAINS: ${{ vars.ALLOWED_DOMAINS }}
          NEXT_PUBLIC_ALLOWED_EMBED_DOMAINS: ${{ vars.ALLOWED_EMBED_DOMAINS }}
          NEXT_PUBLIC_OAUTH_CLIENT_NAMES: ${{ vars.OAUTH_CLIENT_NAMES }}
          NEXT_PUBLIC_FORUM_URL: ${{ vars.FORUM_URL }}

      - name: Persist force upgrade serial
        if: steps.deploy-serial.outputs.is-force == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh variable set FORCE_UPGRADE_SERIAL --body "${{ steps.deploy-serial.outputs.next-serial }}"
          echo "FORCE_UPGRADE_SERIAL updated to ${{ steps.deploy-serial.outputs.next-serial }}"

      - name: Deploy to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 保存构建产物到临时目录
          cp -r out $RUNNER_TEMP/out
          git checkout --orphan deploy-temp
          # 清空工作目录
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          # 从临时目录复制回来
          cp -r $RUNNER_TEMP/out/* .
          git add -A
          COMMIT_MSG=$(git log -1 --pretty=%s $GITHUB_SHA)
          git commit -m "deploy: ${{ github.ref_name || inputs.version }} - $COMMIT_MSG"
          git push origin deploy-temp:deploy --force
