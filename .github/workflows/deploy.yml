name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.2.0)'
        required: true
        type: string
      force:
        description: 'Force upgrade'
        required: false
        type: boolean
        default: false

jobs:
  # ── Tag preparation (runs once, before matrix) ──────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      clean-tag: ${{ steps.tag-prep.outputs.clean-tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version format
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION (expected vX.Y.Z)"
            exit 1
          fi

      - name: Prepare deploy tag and force marker
        id: tag-prep
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME="${{ github.ref_name }}"
            if echo "$TAG_NAME" | grep -q '\-force$'; then
              IS_FORCE=true
              CLEAN_TAG=$(echo "$TAG_NAME" | sed 's/-force$//')
            else
              IS_FORCE=false
              CLEAN_TAG="$TAG_NAME"
            fi
          else
            CLEAN_TAG="${{ inputs.version }}"
            IS_FORCE="${{ inputs.force }}"
            git tag -a "$CLEAN_TAG" -m "$CLEAN_TAG"
            git push origin "$CLEAN_TAG"
          fi

          if [ "$IS_FORCE" = "true" ]; then
            OLD=$(git tag -l 'force-*' | head -1)
            if [ -n "$OLD" ]; then
              CURRENT=$(echo "$OLD" | sed 's/force-//')
              git push origin --delete "$OLD" 2>/dev/null || true
              git tag -d "$OLD" 2>/dev/null || true
            else
              CURRENT=0
            fi
            NEXT=$((CURRENT + 1))
            git tag "force-${NEXT}"
            git push origin "force-${NEXT}"
            echo "Updated force marker: force-${CURRENT} -> force-${NEXT}"
          fi

          echo "clean-tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

  # ── Build & Deploy (matrix: intl + cn) ──────────────────
  build-deploy:
    name: Build & Deploy (${{ matrix.target }})
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - intl
          - cn
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          DEPLOY_TAG: ${{ needs.prepare.outputs.clean-tag }}
          SITE_URL: https://end.canmoe.com
          NEXT_PUBLIC_API_BASE_URL: ${{ matrix.target == 'intl' && vars.API_BASE_URL || '' }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ matrix.target == 'intl' && secrets.TURNSTILE_SITE_KEY || '' }}
          NEXT_PUBLIC_ALLOWED_DOMAINS: ${{ matrix.target == 'intl' && vars.ALLOWED_DOMAINS || '' }}
          NEXT_PUBLIC_ALLOWED_EMBED_DOMAINS: ${{ matrix.target == 'intl' && vars.ALLOWED_EMBED_DOMAINS || '' }}
          NEXT_PUBLIC_OAUTH_CLIENT_NAMES: ${{ matrix.target == 'intl' && vars.OAUTH_CLIENT_NAMES || '' }}
          NEXT_PUBLIC_FORUM_URL: ${{ matrix.target == 'intl' && vars.FORUM_URL || '' }}

      - name: Deploy to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 保存构建产物到临时目录
          cp -r out $RUNNER_TEMP/out
          git checkout --orphan deploy-temp
          # 清空工作目录
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          # 从临时目录复制回来
          cp -r $RUNNER_TEMP/out/* .
          git add -A
          COMMIT_MSG=$(git log -1 --pretty=%s $GITHUB_SHA)
          git commit -m "deploy: ${{ github.ref_name || inputs.version }} [${{ matrix.target }}] - $COMMIT_MSG"
          git push origin deploy-temp:deploy-${{ matrix.target }} --force
