name: Sync Game Data
on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:      # manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch tracking branch
        run: |
          git fetch origin auto/upstream-tracking || true

      - name: Sync AKEData fork from upstream
        env:
          GH_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          gh api --method POST /repos/cmyyx/AKEData/merge-upstream \
            -f branch='main'

      - name: Check upstream changes
        id: diff
        env:
          GH_FORK_SYNC_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          # Shallow sparse-clone AKEData fork (synced from upstream above)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            "https://oauth2:${GH_FORK_SYNC_TOKEN}@github.com/cmyyx/AKEData.git" upstream/AKEData
          git -C upstream/AKEData sparse-checkout init --cone
          git -C upstream/AKEData sparse-checkout set \
            output/CN/weapon output/CN/equip \
            TableCfg/WeaponBasicTable.json \
            TableCfg/CharWpnRecommendTable.json \
            TableCfg/ItemTable.json \
            TableCfg/WorldEnergyPointGroupTable.json \
            TableCfg/WorldEnergyPointTable.json \
            TableCfg/GemTable.json \
            TableCfg/I18nTextTable_CN.json \
            TableCfg/I18nTextTable_EN.json \
            TableCfg/I18nTextTable_JP.json \
            TableCfg/I18nTextTable_TC.json
          git -C upstream/AKEData checkout

          # Clone public AKEDatabase (no auth needed)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            https://github.com/NagiYume/AKEDatabase.git upstream/AKEDatabase
          git -C upstream/AKEDatabase sparse-checkout init --cone
          git -C upstream/AKEDatabase sparse-checkout set public/CH
          git -C upstream/AKEDatabase checkout

          # Clone public translation repo (no auth needed)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            https://github.com/SusieGlitter/EndFieldTranslationReferrer.git upstream/EndFieldTranslationReferrer
          git -C upstream/EndFieldTranslationReferrer sparse-checkout init --cone
          git -C upstream/EndFieldTranslationReferrer sparse-checkout set i18n
          git -C upstream/EndFieldTranslationReferrer checkout

          # Run check (exit code 2 = changed, 0 = no change)
          set +e
          npx tsx scripts/sync-game-data.ts --check \
            --akedata upstream/AKEData \
            --imagedb upstream/AKEDatabase \
            --translation upstream/EndFieldTranslationReferrer
          exit_code=$?
          set -e
          if [ $exit_code -eq 2 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  sync:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync AKEData fork from upstream
        env:
          GH_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          gh api --method POST /repos/cmyyx/AKEData/merge-upstream \
            -f branch='main'

      - name: Clone upstream repos
        env:
          GH_FORK_SYNC_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          # Clone AKEData fork (synced from upstream above)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            "https://oauth2:${GH_FORK_SYNC_TOKEN}@github.com/cmyyx/AKEData.git" upstream/AKEData
          git -C upstream/AKEData sparse-checkout init --cone
          git -C upstream/AKEData sparse-checkout set \
            output/CN/weapon output/CN/equip \
            TableCfg/WeaponBasicTable.json \
            TableCfg/CharWpnRecommendTable.json \
            TableCfg/ItemTable.json \
            TableCfg/WorldEnergyPointGroupTable.json \
            TableCfg/WorldEnergyPointTable.json \
            TableCfg/GemTable.json \
            TableCfg/I18nTextTable_CN.json \
            TableCfg/I18nTextTable_EN.json \
            TableCfg/I18nTextTable_JP.json \
            TableCfg/I18nTextTable_TC.json
          git -C upstream/AKEData checkout

          # Clone public AKEDatabase (no auth needed)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            https://github.com/NagiYume/AKEDatabase.git upstream/AKEDatabase
          git -C upstream/AKEDatabase sparse-checkout init --cone
          git -C upstream/AKEDatabase sparse-checkout set public/CH
          git -C upstream/AKEDatabase checkout

          # Clone public translation repo (no auth needed)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            https://github.com/SusieGlitter/EndFieldTranslationReferrer.git upstream/EndFieldTranslationReferrer
          git -C upstream/EndFieldTranslationReferrer sparse-checkout init --cone
          git -C upstream/EndFieldTranslationReferrer sparse-checkout set i18n
          git -C upstream/EndFieldTranslationReferrer checkout

      - name: Run sync update
        run: |
          npx tsx scripts/sync-game-data.ts --update \
            --akedata upstream/AKEData \
            --imagedb upstream/AKEDatabase \
            --translation upstream/EndFieldTranslationReferrer

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: sync game data from upstream'
          branch: auto/sync-game-data
          commit-message: 'chore: sync game data from upstream'
          body: |
            Automated sync from:
            - AKEData (output/CN/weapon, output/CN/equip, TableCfg/)
            - AKEDatabase (public/CH/weapon, public/CH/equip)
            - EndFieldTranslationReferrer (i18n/)

            Generated files:
            - `src/generated/i18n/weapons/`
            - `src/generated/i18n/equips/`
            - `src/generated/i18n/dungeons/`
            - `src/generated/i18n/stats/`
            - `src/generated/i18n/regions/`
