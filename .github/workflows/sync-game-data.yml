name: Sync Game Data
on:
  schedule:
    - cron: '0 0 * * 4,5'  # every Thursday and Friday at 00:00 UTC
  workflow_dispatch:      # manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate AKEData access token
        env:
          GH_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          RESULT=$(gh api /repos/cmyyx/AKEData --jq .private 2>/dev/null) || true
          if [ "$RESULT" != "true" ]; then
            echo "::error::Cannot access private AKEData fork. GH_FORK_SYNC_TOKEN may be invalid or expired. Sync pipeline cannot verify upstream data integrity."
            exit 1
          fi

      - name: Sync AKEData fork from upstream
        env:
          GH_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          gh api --method POST /repos/cmyyx/AKEData/merge-upstream \
            -f branch='main'

      - name: Clone upstream repos (outside working tree)
        env:
          GH_FORK_SYNC_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          UPSTREAM_DIR="$RUNNER_TEMP/upstream"
          mkdir -p "$UPSTREAM_DIR"

          # Clone AKEData fork (synced from upstream above)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            "https://oauth2:${GH_FORK_SYNC_TOKEN}@github.com/cmyyx/AKEData.git" "$UPSTREAM_DIR/AKEData"
          git -C "$UPSTREAM_DIR/AKEData" sparse-checkout init --cone
          git -C "$UPSTREAM_DIR/AKEData" sparse-checkout set \
            TableCfg \
            output/CN/weapon output/CN/equip
          git -C "$UPSTREAM_DIR/AKEData" checkout

          # Clone public AKEDatabase (no auth needed)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            https://github.com/NagiYume/AKEDatabase.git "$UPSTREAM_DIR/AKEDatabase"
          git -C "$UPSTREAM_DIR/AKEDatabase" sparse-checkout init --cone
          git -C "$UPSTREAM_DIR/AKEDatabase" sparse-checkout set \
            public/CH/equip public/CH/v2_equip \
            public/CH/maps.json public/EN/maps.json \
            public/JP/maps.json public/TC/maps.json \
            public/images/character/charpic \
            public/images/character/imagepoaster/largesize \
            public/images/character/skillicon \
            public/images/character/spaceshipskillicon \
            public/images/weapon/iconbig \
            public/images/equip/iconbig \
            public/images/item/itemiconbig
          git -C "$UPSTREAM_DIR/AKEDatabase" checkout

      - name: Check upstream changes
        id: diff
        run: |
          # Run check (exit code 2 = changed, 0 = no change)
          set +e
          npx tsx scripts/sync-game-data.ts --check \
            --akedata "$RUNNER_TEMP/upstream/AKEData" \
            --imagedb "$RUNNER_TEMP/upstream/AKEDatabase"
          exit_code=$?
          set -e
          if [ $exit_code -eq 2 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ $exit_code -eq 0 ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "::error::Check script failed with exit code $exit_code"
            exit $exit_code
          fi

      - name: Cleanup upstream clones
        if: always()
        run: rm -rf "$RUNNER_TEMP/upstream"

  sync:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate AKEData access token
        env:
          GH_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          RESULT=$(gh api /repos/cmyyx/AKEData --jq .private 2>/dev/null) || true
          if [ "$RESULT" != "true" ]; then
            echo "::error::Cannot access private AKEData fork. GH_FORK_SYNC_TOKEN may be invalid or expired. Sync pipeline cannot produce verified data."
            exit 1
          fi

      - name: Sync AKEData fork from upstream
        env:
          GH_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          gh api --method POST /repos/cmyyx/AKEData/merge-upstream \
            -f branch='main'

      - name: Clone upstream repos (outside working tree)
        env:
          GH_FORK_SYNC_TOKEN: ${{ secrets.GH_FORK_SYNC_TOKEN }}
        run: |
          UPSTREAM_DIR="$RUNNER_TEMP/upstream"
          mkdir -p "$UPSTREAM_DIR"

          # Clone AKEData fork (synced from upstream above)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            "https://oauth2:${GH_FORK_SYNC_TOKEN}@github.com/cmyyx/AKEData.git" "$UPSTREAM_DIR/AKEData"
          git -C "$UPSTREAM_DIR/AKEData" sparse-checkout init --cone
          git -C "$UPSTREAM_DIR/AKEData" sparse-checkout set \
            TableCfg \
            output/CN/weapon output/CN/equip
          git -C "$UPSTREAM_DIR/AKEData" checkout

          # Clone public AKEDatabase (no auth needed)
          git clone --depth 1 --filter=blob:none --sparse --no-checkout \
            https://github.com/NagiYume/AKEDatabase.git "$UPSTREAM_DIR/AKEDatabase"
          git -C "$UPSTREAM_DIR/AKEDatabase" sparse-checkout init --cone
          git -C "$UPSTREAM_DIR/AKEDatabase" sparse-checkout set \
            public/CH/equip public/CH/v2_equip \
            public/CH/maps.json public/EN/maps.json \
            public/JP/maps.json public/TC/maps.json \
            public/images/character/charpic \
            public/images/character/imagepoaster/largesize \
            public/images/character/skillicon \
            public/images/character/spaceshipskillicon \
            public/images/weapon/iconbig \
            public/images/equip/iconbig \
            public/images/item/itemiconbig
          git -C "$UPSTREAM_DIR/AKEDatabase" checkout

      - name: Run sync update
        run: |
          npx tsx scripts/sync-game-data.ts --update \
            --akedata "$RUNNER_TEMP/upstream/AKEData" \
            --imagedb "$RUNNER_TEMP/upstream/AKEDatabase"

      - name: Cleanup upstream clones
        if: always()
        run: rm -rf "$RUNNER_TEMP/upstream"

      - name: Verify no submodule pollution
        run: |
          if [ -f .gitmodules ]; then
            echo "::error::.gitmodules file detected in working tree! This indicates submodule pollution from upstream repo clones. Contents:"
            cat .gitmodules
            exit 1
          fi
          if git ls-files --error-unmatch .gitmodules >/dev/null 2>&1; then
            echo "::error::.gitmodules is tracked by git! Submodule pollution has been committed."
            exit 1
          fi
          echo "Submodule check passed — no .gitmodules pollution."

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          title: 'chore: sync game data from upstream'
          branch: auto/sync-game-data
          commit-message: 'chore: sync game data from upstream'
          body: |
            Automated sync from:
            - AKEData (output/CN/weapon, output/CN/equip, TableCfg/)
            - AKEDatabase (public/CH/equip, public/CH/v2_equip, selected public/images icon directories)

            Generated files:
            - `src/generated/i18n/weapons/`
            - `src/generated/i18n/equips/`
            - `src/generated/i18n/dungeons/`
            - `src/generated/i18n/stats/`
            - `src/generated/i18n/regions/`
